name: Mobile Build

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "android/**"
      - "ios/**"
      - "app.js"
      - "index.html"
      - "styles.css"
      - "capacitor.config.json"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/mobile-build.yml"

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle
      - run: pnpm install --frozen-lockfile
      - run: pnpm mobile:sync:android
        env:
          LABINSIGHT_API_URL: ${{ vars.LABINSIGHT_API_URL }}
      - run: ./gradlew assembleDebug
        working-directory: android
      - uses: actions/upload-artifact@v4
        with:
          name: LabInsight-Android-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm mobile:sync:ios
        env:
          LABINSIGHT_API_URL: ${{ vars.LABINSIGHT_API_URL }}
      - name: Build iOS simulator app
        run: >-
          xcodebuild
          -workspace ios/App/App.xcworkspace
          -scheme App
          -configuration Debug
          -sdk iphonesimulator
          -derivedDataPath ios/DerivedData
          CODE_SIGNING_ALLOWED=NO
          build
      - name: Archive simulator app
        run: ditto -c -k --sequesterRsrc --keepParent ios/DerivedData/Build/Products/Debug-iphonesimulator/App.app LabInsight-iOS-Simulator.zip
      - uses: actions/upload-artifact@v4
        with:
          name: LabInsight-iOS-simulator
          path: LabInsight-iOS-Simulator.zip
          if-no-files-found: error
